<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer dark circle -->
  <circle cx="100" cy="100" r="100" fill="#2d1f12"/>

  <!-- Inner cream circle -->
  <circle cx="100" cy="100" r="62" fill="#eee6d9"/>

  <!-- Circular text paths -->
  <defs>
    <path id="topArc" d="M 16,100 a84,84 0 1,1 168,0"/>
    <path id="bottomArc" d="M 184,100 a84,84 0 1,1 -168,0"/>
  </defs>

  <!-- Top arc text -->
  <text font-family="Anton, Impact, sans-serif" font-size="13" fill="#eee6d9" letter-spacing="3">
    <textPath href="#topArc" startOffset="3%">NEW MENU * NEW MENU *</textPath>
  </text>

  <!-- Bottom arc text -->
  <text font-family="Anton, Impact, sans-serif" font-size="13" fill="#eee6d9" letter-spacing="3">
    <textPath href="#bottomArc" startOffset="3%">NEW MENU * NEW MENU *</textPath>
  </text>

  <!-- Flame icon centered at 100,100 -->
  <path
    d="M100 128
       C90 128 80 120 80 108
       C80 100 84 94 88 88
       C88 96 92 100 96 100
       C94 92 96 82 100 72
       C104 82 106 92 104 100
       C108 100 112 96 112 88
       C116 94 120 100 120 108
       C120 120 110 128 100 128 Z"
    fill="#2d1f12"
  />
  <!-- Inner flame highlight -->
  <path
    d="M100 122
       C95 122 91 118 91 112
       C91 107 94 103 97 100
       C97 104 99 106 100 107
       C101 106 103 104 103 100
       C106 103 109 107 109 112
       C109 118 105 122 100 122 Z"
    fill="#eee6d9"
    opacity="0.4"
  />
</svg>
